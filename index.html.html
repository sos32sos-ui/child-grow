
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
.app{max-width:940px;margin:0 auto;padding:1rem;position:relative;min-height:500px}
.hdr{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.85rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.htitle{font-size:17px;font-weight:500;display:flex;align-items:center;gap:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:#1D9E75;opacity:0;transition:opacity .3s}.sdot.on{opacity:1}
.ctabs{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tab{padding:5px 13px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);cursor:pointer;font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.tab.active{background:#185FA5;border-color:#185FA5;color:#fff}
.tab-mgr{border-style:dashed}
.nav{display:flex;gap:4px;margin-bottom:1rem;background:var(--color-background-secondary);padding:3px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.nb{flex:1;padding:7px;border-radius:6px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.nb.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border:0.5px solid var(--color-border-tertiary)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.met{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.met-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px}
.met-val{font-size:18px;font-weight:500}
.met-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.st-thin{color:#185FA5}.st-normal{color:#1D9E75}.st-over{color:#BA7517}.st-obese{color:#A32D2D}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;color:var(--color-text-secondary)}
.fg input,.fg select{padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:14px;width:100%}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-blue{width:100%;padding:9px;background:#185FA5;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;font-weight:500;margin-top:10px}
.btn-blue:hover{background:#0C447C}
.btn-ghost{padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;font-size:12px;color:var(--color-text-secondary)}
.btn-red{padding:5px 10px;border:0.5px solid #F09595;border-radius:var(--border-radius-md);background:none;cursor:pointer;font-size:11px;color:#A32D2D}
.recs{display:flex;flex-direction:column;gap:6px}
.rec{display:grid;grid-template-columns:90px 1fr 1fr 1fr 1fr auto auto;align-items:center;gap:6px;padding:8px 10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px}
.rv{text-align:center;color:var(--color-text-secondary)}
.rv small{display:block;font-size:10px;color:var(--color-text-tertiary)}
.ib{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:13px;padding:3px 5px;border-radius:4px}
.ib:hover{background:var(--color-background-primary)}.ib.del:hover{color:#A32D2D}
.ctabs2{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ct{padding:4px 12px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:none;cursor:pointer;font-size:12px;color:var(--color-text-secondary)}
.ct.active{background:#185FA5;border-color:#185FA5;color:#fff}
.cwrap{position:relative;width:100%;height:340px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:11px;color:var(--color-text-tertiary);align-items:center}
.chart-note{font-size:11px;color:var(--color-text-tertiary);margin-top:5px}
.ov{display:none;position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.5);z-index:50;align-items:flex-start;justify-content:center;padding-top:30px;min-height:100%}
.ov.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1.25rem;width:350px;border:0.5px solid var(--color-border-secondary)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.mfooter{display:flex;gap:8px;margin-top:14px}
.mfooter button{flex:1;padding:9px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px}
.empty{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:13px}
.toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1}
.crow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.crow:last-child{border-bottom:none}
.exbox{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;font-size:11px;line-height:1.8;font-family:var(--font-mono);white-space:pre;overflow-x:auto;max-height:180px;overflow-y:auto}
.warn-box{border-radius:var(--border-radius-md);padding:9px 14px;font-size:12px;margin-top:10px;display:none;border:0.5px solid}
</style>
<div class="app" id="app">
  <div class="hdr">
    <div class="htitle">兒童成長記錄 <span class="sdot" id="sdot"></span></div>
    <div class="ctabs" id="tabs"></div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="gotoTab('record')">紀錄</button>
    <button class="nb" onclick="gotoTab('chart')">成長曲線</button>
    <button class="nb" onclick="gotoTab('history')">歷史紀錄</button>
  </div>
  <div id="pg-record">
    <div class="metrics">
      <div class="met"><div class="met-label">最新身高</div><div class="met-val" id="mv-h">--</div><div class="met-sub" id="ms-h"></div></div>
      <div class="met"><div class="met-label">最新體重</div><div class="met-val" id="mv-w">--</div><div class="met-sub" id="ms-w"></div></div>
      <div class="met"><div class="met-label">最新頭圍</div><div class="met-val" id="mv-hc">--</div><div class="met-sub" id="ms-hc"></div></div>
      <div class="met"><div class="met-label">BMI</div><div class="met-val" id="mv-bmi">--</div><div class="met-sub" id="ms-bmi"></div></div>
    </div>
    <div class="card" id="noChildCard" style="display:none">
      <div class="empty">尚未建立孩子檔案<br><br><button class="btn-blue" style="width:auto;padding:8px 24px" onclick="openAddChild()">新增第一位孩子</button></div>
    </div>
    <div class="card" id="addRecCard">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px">新增量測紀錄</div>
      <div class="fgrid">
        <div class="fg"><label>量測日期</label><input type="date" id="f-date"></div>
        <div class="fg"><label>身高 (cm)</label><input type="number" id="f-h" placeholder="例：85.5" step="0.1" min="0"></div>
        <div class="fg"><label>體重 (kg)</label><input type="number" id="f-w" placeholder="例：12.0" step="0.1" min="0"></div>
        <div class="fg"><label>頭圍 (cm)</label><input type="number" id="f-hc" placeholder="例：47.0" step="0.1" min="0"></div>
      </div>
      <div class="warn-box" id="warnBox"></div>
      <button class="btn-blue" onclick="addRecord()">儲存紀錄</button>
    </div>
  </div>
  <div id="pg-chart" style="display:none">
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px">成長曲線圖（WHO 官方標準）</div>
      <div class="ctabs2">
        <button class="ct active" onclick="switchChart('height',this)">身高</button>
        <button class="ct" onclick="switchChart('weight',this)">體重</button>
        <button class="ct" onclick="switchChart('head',this)">頭圍</button>
        <button class="ct" onclick="switchChart('bmi',this)">BMI</button>
      </div>
      <div class="cwrap"><canvas id="gChart"></canvas></div>
      <div class="legend" id="chartLegend">
        <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #e24b4a;vertical-align:middle;margin-right:3px"></span>P97</span>
        <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #ef9f27;vertical-align:middle;margin-right:3px"></span>P85</span>
        <span><span style="display:inline-block;width:20px;height:2px;background:#3266ad;vertical-align:middle;margin-right:3px"></span>P50</span>
        <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #ef9f27;vertical-align:middle;margin-right:3px"></span>P15</span>
        <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #e24b4a;vertical-align:middle;margin-right:3px"></span>P3</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1D9E75;vertical-align:middle;margin-right:3px"></span>孩子數據</span>
      </div>
      <div class="chart-note" id="chartNote"></div>
    </div>
  </div>
  <div id="pg-history" style="display:none">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:.75rem 1.25rem;margin-bottom:1rem">
      <div style="font-size:14px;font-weight:500">所有量測紀錄</div>
      <button class="btn-ghost" onclick="openExport()">匯出 CSV</button>
    </div>
    <div class="card"><div id="recList"><div class="empty">尚無紀錄</div></div></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="ov" id="ov-add"><div class="modal"><h3>新增孩子</h3><div class="fg" style="margin-bottom:10px"><label>名字</label><input type="text" id="nc-name" placeholder="例：小明"></div><div class="fg" style="margin-bottom:10px"><label>性別</label><select id="nc-g"><option value="boy">男生</option><option value="girl">女生</option></select></div><div class="fg"><label>出生日期</label><input type="date" id="nc-bday"></div><div class="mfooter"><button onclick="closeOv('ov-add')" style="border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary)">取消</button><button onclick="saveChild()" style="background:#185FA5;color:#fff;border:none">確認新增</button></div></div></div>
  <div class="ov" id="ov-edit"><div class="modal"><h3>修改量測紀錄</h3><input type="hidden" id="er-id"><div class="fgrid" style="margin-bottom:4px"><div class="fg"><label>量測日期</label><input type="date" id="er-date"></div><div class="fg"><label>身高 (cm)</label><input type="number" id="er-h" step="0.1" min="0"></div><div class="fg"><label>體重 (kg)</label><input type="number" id="er-w" step="0.1" min="0"></div><div class="fg"><label>頭圍 (cm)</label><input type="number" id="er-hc" step="0.1" min="0"></div></div><div class="mfooter"><button onclick="closeOv('ov-edit')" style="border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary)">取消</button><button onclick="saveEdit()" style="background:#185FA5;color:#fff;border:none">儲存修改</button></div></div></div>
  <div class="ov" id="ov-mgr"><div class="modal" style="width:370px"><h3>管理孩子</h3><div id="mgrList"></div><div class="mfooter"><button onclick="closeOv('ov-mgr')" style="border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary)">關閉</button><button onclick="closeOv('ov-mgr');openAddChild()" style="background:#185FA5;color:#fff;border:none">+ 新增孩子</button></div></div></div>
  <div class="ov" id="ov-cdel"><div class="modal"><h3>確認刪除</h3><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">確定要刪除 <strong id="delName"></strong> 的所有資料嗎？</p><div class="mfooter"><button onclick="closeOv('ov-cdel');openMgr()" style="border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary)">取消</button><button onclick="doDelChild()" style="background:#A32D2D;color:#fff;border:none">確認刪除</button></div></div></div>
  <div class="ov" id="ov-export"><div class="modal" style="width:440px"><h3>匯出資料</h3><div class="exbox" id="exbox"></div><div class="mfooter"><button onclick="closeOv('ov-export')" style="border:0.5px solid var(--color-border-secondary);background:none;color:var(--color-text-secondary)">關閉</button><button onclick="doCopy()" style="background:#185FA5;color:#fff;border:none">複製</button></div></div></div>
</div>

// BMI 判斷：台灣衛福部標準，以半歲為單位線性插值
function calcBmiStatus(bmi, ageYears, gender) {
  const tbl = gender==='boy' ? TW_BMI_BOY : TW_BMI_GIRL;
  const maxAge = 17.5;
  const a = Math.min(Math.max(ageYears, 0), maxAge);
  // 找插值區間
  let i = Math.min(Math.floor(a/0.5), tbl.length-2);
  const t = (a - tbl[i][0]) / 0.5;
  const thin = tbl[i][1] + (tbl[i+1][1]-tbl[i][1])*t;
  const ow   = tbl[i][2] + (tbl[i+1][2]-tbl[i][2])*t;
  const ob   = tbl[i][3] + (tbl[i+1][3]-tbl[i][3])*t;
  if (bmi < thin) return {label:'過輕', cls:'st-thin'};
  if (bmi >= ob)  return {label:'肥胖', cls:'st-obese'};
  if (bmi >= ow)  return {label:'過重', cls:'st-over'};
  return {label:'正常', cls:'st-normal'};
}

// BMI 圖表用曲線（從衛福部表提取4條線）
function buildTwBmiCurves(gender) {
  const tbl = gender==='boy' ? TW_BMI_BOY : TW_BMI_GIRL;
  const thin=[],ow=[],ob=[];
  tbl.forEach(r=>{
    thin.push({x:r[0],y:r[1]});
    ow.push({x:r[0],y:r[2]});
    ob.push({x:r[0],y:r[3]});
  });
  return {thin,ow,ob};
}

// 身高體重百分位（WHO）
function getRefHW(type, gender, mo) {
  const m = Math.max(0,Math.min(228,Math.round(mo)));
  if(type==='height') return (gender==='boy'?H_BOY:H_GIRL)[Math.min(m,228)];
  if(type==='head')   { if(m>60)return null; return (gender==='boy'?HC_BOY:HC_GIRL)[m]; }
  if(type==='weight') {
    const a=gender==='boy'?W_BOY_M:W_GIRL_M, b=gender==='boy'?W_BY:W_GY;
    if(m<=60)return a[Math.min(m,60)];
    const yi=Math.floor((m-60)/12), rem=(m-60)%12;
    const i0=Math.min(yi,b.length-1), i1=Math.min(yi+1,b.length-1);
    return b[i0].map((v,k)=>v+(b[i1][k]-v)*rem/12);
  }
  return null;
}

function calcPctStr(val,ref){
  if(!ref)return'無資料';
  const[p3,p15,p50,p85,p97]=ref;
  if(val<p3)return'<P3';if(val<p15)return'P3~P15';if(val<p50)return'P15~P50';
  if(val<p85)return'P50~P85';if(val<p97)return'P85~P97';return'>P97';
}
function calcPctNum(val,ref){
  if(!ref)return null;
  const[p3,p15,p50,p85,p97]=ref;
  const pts=[[0,p3-3*(p15-p3)/12],[3,p3],[15,p15],[50,p50],[85,p85],[97,p97],[100,p97+3*(p97-p85)/12]];
  for(let i=1;i<pts.length;i++){if(val<=pts[i][1]){const t=(val-pts[i-1][1])/(pts[i][1]-pts[i-1][1]);return Math.round(pts[i-1][0]+t*(pts[i][0]-pts[i-1][0]));}}
  return 99;
}
function getAgeMonths(bday,mdate){
  const b=new Date(bday),m=new Date(mdate);
  let mo=(m.getFullYear()-b.getFullYear())*12+(m.getMonth()-b.getMonth());
  if(m.getDate()<b.getDate())mo--;return Math.max(0,mo);
}
function getAgeYears(bday,mdate){const b=new Date(bday),m=new Date(mdate);return Math.max(0,(m-b)/(365.25*24*3600*1000));}

let S={children:[],records:{},active:null,nextId:1,tab:'record',chartType:'height'};
let gChart=null,pendDelId=null,saveTimer=null;

async function load(){
  try{const r=await window.storage.get('cgt-v4');if(r&&r.value)Object.assign(S,JSON.parse(r.value));}catch(e){}
  if(S.children.length>0&&!S.active)S.active=S.children[0].id;
  document.getElementById('f-date').value=today();render();
}
function today(){return new Date().toISOString().split('T')[0]}
async function save(){
  const dot=document.getElementById('sdot');dot.classList.add('on');clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{try{await window.storage.set('cgt-v4',JSON.stringify(S));}catch(e){}dot.classList.remove('on');},500);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function openOv(id){document.getElementById(id).classList.add('open')}
function closeOv(id){document.getElementById(id).classList.remove('open')}

function addRecord(){
  if(!S.active){toast('請先新增孩子');return}
  const date=document.getElementById('f-date').value,h=document.getElementById('f-h').value,w=document.getElementById('f-w').value,hc=document.getElementById('f-hc').value;
  if(!date){toast('請填入量測日期');return}
  if(!h&&!w&&!hc){toast('請至少填入一項數值');return}
  const rec={id:Date.now(),date,height:h?parseFloat(h):null,weight:w?parseFloat(w):null,head:hc?parseFloat(hc):null};
  if(!S.records[S.active])S.records[S.active]=[];
  S.records[S.active].push(rec);S.records[S.active].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('f-h').value='';document.getElementById('f-w').value='';document.getElementById('f-hc').value='';
  document.getElementById('f-date').value=today();document.getElementById('warnBox').style.display='none';
  save();render();toast('紀錄已儲存 ✓');
}

function previewBmi(){
  const h=parseFloat(document.getElementById('f-h').value),w=parseFloat(document.getElementById('f-w').value);
  const wb=document.getElementById('warnBox');
  if(h>0&&w>0&&S.active){
    const bmi=w/((h/100)**2),child=S.children.find(c=>c.id===S.active);
    if(child){
      const age=getAgeYears(child.birthday,document.getElementById('f-date').value||today());
      const st=calcBmiStatus(bmi,age,child.gender);
      if(st.label==='過重'||st.label==='肥胖'||st.label==='過輕'){
        wb.style.display='block';
        const cfg={過重:{bg:'#FAEEDA',bd:'#EF9F27',c:'#633806'},肥胖:{bg:'#FCEBEB',bd:'#F09595',c:'#791F1F'},過輕:{bg:'#E6F1FB',bd:'#378ADD',c:'#0C447C'}};
        const s=cfg[st.label];
        wb.textContent=`預估 BMI ${bmi.toFixed(1)}：${st.label}，建議諮詢兒科醫師。`;
        wb.style.background=s.bg;wb.style.borderColor=s.bd;wb.style.color=s.c;
        return;
      }
    }
  }
  wb.style.display='none';
}
document.addEventListener('input',e=>{if(['f-h','f-w'].includes(e.target.id))previewBmi();});

function delRec(id){S.records[S.active]=S.records[S.active].filter(r=>r.id!==id);save();render();toast('已刪除');}
function openEdit(id){
  const r=S.records[S.active].find(x=>x.id===id);if(!r)return;
  document.getElementById('er-id').value=id;document.getElementById('er-date').value=r.date;
  document.getElementById('er-h').value=r.height??'';document.getElementById('er-w').value=r.weight??'';document.getElementById('er-hc').value=r.head??'';
  openOv('ov-edit');
}
function saveEdit(){
  const id=parseInt(document.getElementById('er-id').value),date=document.getElementById('er-date').value;
  const h=document.getElementById('er-h').value,w=document.getElementById('er-w').value,hc=document.getElementById('er-hc').value;
  if(!date){toast('請填入日期');return}
  const recs=S.records[S.active];const i=recs.findIndex(x=>x.id===id);if(i<0)return;
  recs[i]={id,date,height:h?parseFloat(h):null,weight:w?parseFloat(w):null,head:hc?parseFloat(hc):null};
  recs.sort((a,b)=>a.date.localeCompare(b.date));closeOv('ov-edit');save();render();toast('已儲存 ✓');
}
function gotoTab(t){
  S.tab=t;['record','chart','history'].forEach(x=>document.getElementById('pg-'+x).style.display=x===t?'block':'none');
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('active',['record','chart','history'][i]===t));
  if(t==='chart')renderChart();
}
function switchChart(type,el){S.chartType=type;document.querySelectorAll('.ct').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderChart();}
function openAddChild(){openOv('ov-add')}
function saveChild(){
  const name=document.getElementById('nc-name').value.trim(),gender=document.getElementById('nc-g').value,bday=document.getElementById('nc-bday').value;
  if(!name||!bday){toast('請填入名字與出生日期');return}
  const id=S.nextId++;S.children.push({id,name,gender,birthday:bday});S.records[id]=[];S.active=id;
  closeOv('ov-add');document.getElementById('f-date').value=today();save();render();toast(name+' 已新增 ✓');
}
function openMgr(){
  const el=document.getElementById('mgrList');
  if(!S.children.length){el.innerHTML='<div class="empty" style="padding:1rem">尚無孩子資料</div>';}
  else el.innerHTML=S.children.map(c=>`<div class="crow"><div><div style="font-size:14px;font-weight:500">${c.name}</div><div style="font-size:11px;color:var(--color-text-tertiary)">${c.gender==='boy'?'男生':'女生'} · ${c.birthday} · ${(S.records[c.id]||[]).length} 筆</div></div><button class="btn-red" onclick="askDel(${c.id},'${c.name}')">刪除</button></div>`).join('');
  openOv('ov-mgr');
}
function askDel(id,name){pendDelId=id;document.getElementById('delName').textContent=name;closeOv('ov-mgr');openOv('ov-cdel');}
function doDelChild(){
  const name=(S.children.find(c=>c.id===pendDelId)||{}).name||'';
  S.children=S.children.filter(c=>c.id!==pendDelId);delete S.records[pendDelId];
  if(S.active===pendDelId)S.active=S.children.length?S.children[0].id:null;
  closeOv('ov-cdel');save();render();toast(name+' 已刪除');
}
function renderTabs(){
  const el=document.getElementById('tabs');
  let h=S.children.map(c=>`<button class="tab${c.id===S.active?' active':''}" onclick="S.active=${c.id};render()">${c.name}</button>`).join('');
  el.innerHTML=h+`<button class="tab tab-mgr" onclick="openMgr()">⚙ 管理</button>`;
}
function renderMetrics(){
  const child=S.children.find(c=>c.id===S.active);const recs=S.records[S.active]||[];const last=recs.length?recs[recs.length-1]:null;
  const setM=(k,val,type)=>{
    const ve=document.getElementById('mv-'+k),se=document.getElementById('ms-'+k);if(!ve)return;
    if(!child||val==null){ve.textContent='--';se.textContent='';ve.className='met-val';return}
    const mo=getAgeMonths(child.birthday,last.date);
    if(type==='bmi'){
      const age=getAgeYears(child.birthday,last.date);
      ve.textContent=val.toFixed(1);ve.className='met-val';
      const st=calcBmiStatus(val,age,child.gender);
      se.textContent=st.label;se.className='met-sub '+st.cls;
    }else{
      const ref=getRefHW(type,child.gender,mo);
      ve.textContent=(type==='weight'?val+'kg':val+'cm');ve.className='met-val';
      if(ref){const ps=calcPctStr(val,ref);const pn=calcPctNum(val,ref);se.textContent=`${ps} (P${pn})`;}
      else se.textContent='';se.className='met-sub';
    }
  };
  let bmi=null;if(last&&last.height&&last.weight)bmi=last.weight/((last.height/100)**2);
  setM('h',last?.height,'height');setM('w',last?.weight,'weight');setM('hc',last?.head,'head');setM('bmi',bmi,'bmi');
}
function renderHistory(){
  const child=S.children.find(c=>c.id===S.active);const el=document.getElementById('recList');if(!el)return;
  const recs=[...(S.records[S.active]||[])].reverse();
  if(!recs.length){el.innerHTML='<div class="empty">尚無量測紀錄</div>';return}
  el.innerHTML='<div class="recs">'+recs.map(r=>{
    const mo=child?getAgeMonths(child.birthday,r.date):0;
    const age=child?getAgeYears(child.birthday,r.date):0;
    const ageStr=age<2?(mo+'月'):(age.toFixed(1)+'歲');
    const hRef=getRefHW('height',child?.gender,mo),wRef=getRefHW('weight',child?.gender,mo),hcRef=getRefHW('head',child?.gender,mo);
    const ph=r.height&&hRef?calcPctStr(r.height,hRef):'--',phn=r.height&&hRef?calcPctNum(r.height,hRef):null;
    const pw=r.weight&&wRef?calcPctStr(r.weight,wRef):'--',pwn=r.weight&&wRef?calcPctNum(r.weight,wRef):null;
    const phc=r.head&&hcRef&&mo<=60?calcPctStr(r.head,hcRef):'--',phcn=r.head&&hcRef&&mo<=60?calcPctNum(r.head,hcRef):null;
    let bmi=null,bmiSt={label:'',cls:''};
    if(r.height&&r.weight){bmi=r.weight/((r.height/100)**2);if(child)bmiSt=calcBmiStatus(bmi,age,child.gender);}
    const pTag=(ps,pn)=>ps!=='--'?`<span style="font-size:10px;opacity:.8">${ps}${pn!=null?' P'+pn:''}</span>`:'';
    const bmiTag=bmi!=null?`<span class="${bmiSt.cls}" style="font-size:10px;font-weight:500">${bmiSt.label||'--'}</span>`:'--';
    return`<div class="rec">
      <div style="font-weight:500;font-size:12px">${r.date}<br><span style="font-size:10px;color:var(--color-text-tertiary)">${ageStr}</span></div>
      <div class="rv">${r.height!=null?r.height+'cm':'--'}<small>${pTag(ph,phn)}</small></div>
      <div class="rv">${r.weight!=null?r.weight+'kg':'--'}<small>${pTag(pw,pwn)}</small></div>
      <div class="rv">${r.head!=null?r.head+'cm':'--'}<small>${pTag(phc,phcn)}</small></div>
      <div class="rv">${bmi!=null?bmi.toFixed(1):'--'}<small>${bmiTag}</small></div>
      <button class="ib" onclick="openEdit(${r.id})" title="修改">✏</button>
      <button class="ib del" onclick="delRec(${r.id})" title="刪除">✕</button>
    </div>`;
  }).join('')+'</div>';
}

function renderChart(){
  const child=S.children.find(c=>c.id===S.active);if(!child)return;
  const type=S.chartType,maxMo=type==='head'?60:228;
  const note=document.getElementById('chartNote');
  const legendEl=document.getElementById('chartLegend');

  if(type==='bmi'){
    // BMI 圖：用台灣衛福部4條線（過輕/過重/肥胖切點）
    note.textContent='※ 台灣衛福部 BMI 建議值（陳偉德/張美惠 2010，衛福部102年公布）';
    legendEl.innerHTML=`
      <span><span style="display:inline-block;width:20px;height:0;border-top:2px solid #185FA5;vertical-align:middle;margin-right:3px"></span>過輕切點</span>
      <span><span style="display:inline-block;width:20px;height:0;border-top:2px solid #1D9E75;vertical-align:middle;margin-right:3px"></span>正常上限（過重切點）</span>
      <span><span style="display:inline-block;width:20px;height:0;border-top:2px solid #e24b4a;vertical-align:middle;margin-right:3px"></span>肥胖切點</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1D9E75;vertical-align:middle;margin-right:3px"></span>孩子數據</span>`;
    const curves=buildTwBmiCurves(child.gender);
    const recs=(S.records[S.active]||[]).filter(r=>r.height&&r.weight);
    const childPts=recs.map(r=>{
      const mo=getAgeMonths(child.birthday,r.date);
      const age=getAgeYears(child.birthday,r.date);
      const bmi=r.weight/((r.height/100)**2);
      return{x:parseFloat(Math.min(age,17.5).toFixed(3)),y:parseFloat(bmi.toFixed(2))};
    });
    if(gChart)gChart.destroy();
    const ctx=document.getElementById('gChart');if(!ctx)return;
    gChart=new Chart(ctx,{
      type:'scatter',
      data:{datasets:[
        {label:'過輕切點',data:curves.thin,borderColor:'#185FA5',borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
        {label:'過重切點',data:curves.ow,borderColor:'#1D9E75',borderWidth:2,pointRadius:0,showLine:true,fill:false,tension:0.3},
        {label:'肥胖切點',data:curves.ob,borderColor:'#e24b4a',borderWidth:1.5,borderDash:[5,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
        {label:'孩子數據',data:childPts,borderColor:'#1D9E75',backgroundColor:'#1D9E75',borderWidth:2,pointRadius:6,pointHoverRadius:8,showLine:childPts.length>1,fill:false,tension:0.2}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
          const v=c.raw?.y,age=c.raw?.x;if(v==null)return'';
          const ageStr=age<2?(Math.round(age*12)+'個月'):(age.toFixed(1)+'歲');
          let extra='';
          if(c.dataset.label==='孩子數據'&&child){const st=calcBmiStatus(v,age,child.gender);extra=` [${st.label}]`;}
          return`${c.dataset.label}: ${v.toFixed(1)}（${ageStr}）${extra}`;
        }}}},
        scales:{
          x:{type:'linear',title:{display:true,text:'年齡（歲）',font:{size:12}},min:0,max:17.5,
            ticks:{font:{size:11},callback:v=>Number.isInteger(v)?v+'歲':''}},
          y:{title:{display:true,text:'BMI',font:{size:12}},ticks:{font:{size:11}}}
        }
      }
    });
    return;
  }

  // 身高/體重/頭圍：WHO百分位曲線
  legendEl.innerHTML=`
    <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #e24b4a;vertical-align:middle;margin-right:3px"></span>P97</span>
    <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #ef9f27;vertical-align:middle;margin-right:3px"></span>P85</span>
    <span><span style="display:inline-block;width:20px;height:2px;background:#3266ad;vertical-align:middle;margin-right:3px"></span>P50</span>
    <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #ef9f27;vertical-align:middle;margin-right:3px"></span>P15</span>
    <span><span style="display:inline-block;width:20px;height:0;border-top:2px dashed #e24b4a;vertical-align:middle;margin-right:3px"></span>P3</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#1D9E75;vertical-align:middle;margin-right:3px"></span>孩子數據</span>`;
  note.textContent=type==='head'?'※ WHO 頭圍標準僅提供至 5 歲（月齡 0–60）':
    '※ WHO Child Growth Standards 2006 (0–5 歲) + WHO Growth Reference 2007 (5–19 歲)';
  const refPts={p3:[],p15:[],p50:[],p85:[],p97:[]};
  for(let m=0;m<=maxMo;m++){
    const ref=getRefHW(type,child.gender,m);if(!ref)break;
    const x=m/12;refPts.p3.push({x,y:ref[0]});refPts.p15.push({x,y:ref[1]});refPts.p50.push({x,y:ref[2]});refPts.p85.push({x,y:ref[3]});refPts.p97.push({x,y:ref[4]});
  }
  const recs=(S.records[S.active]||[]).filter(r=>{
    const mo=getAgeMonths(child.birthday,r.date);
    if(type==='head')return r.head!=null&&mo<=60;
    return r[type]!=null;
  });
  const childPts=recs.map(r=>{
    const mo=getAgeMonths(child.birthday,r.date);
    const val=r[type];
    return{x:parseFloat((Math.min(mo,maxMo)/12).toFixed(3)),y:parseFloat(val.toFixed(2))};
  });
  const yLabel={height:'身高 (cm)',weight:'體重 (kg)',head:'頭圍 (cm)'}[type];
  if(gChart)gChart.destroy();const ctx=document.getElementById('gChart');if(!ctx)return;
  gChart=new Chart(ctx,{
    type:'scatter',
    data:{datasets:[
      {label:'P97',data:refPts.p97,borderColor:'#e24b4a',borderWidth:1.2,borderDash:[6,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
      {label:'P85',data:refPts.p85,borderColor:'#ef9f27',borderWidth:1.2,borderDash:[6,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
      {label:'P50',data:refPts.p50,borderColor:'#3266ad',borderWidth:2,pointRadius:0,showLine:true,fill:false,tension:0.3},
      {label:'P15',data:refPts.p15,borderColor:'#ef9f27',borderWidth:1.2,borderDash:[6,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
      {label:'P3', data:refPts.p3, borderColor:'#e24b4a',borderWidth:1.2,borderDash:[6,4],pointRadius:0,showLine:true,fill:false,tension:0.3},
      {label:'孩子數據',data:childPts,borderColor:'#1D9E75',backgroundColor:'#1D9E75',borderWidth:2,pointRadius:6,pointHoverRadius:8,showLine:childPts.length>1,fill:false,tension:0.2}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
        const v=c.raw?.y,age=c.raw?.x;if(v==null)return'';
        const mo=Math.round(age*12),ageStr=age<2?(mo+'個月'):(age.toFixed(1)+'歲');
        const unit=type==='weight'?'kg':'cm';
        let extra='';
        if(c.dataset.label==='孩子數據'){const ref=getRefHW(type,child.gender,mo);if(ref)extra=` [${calcPctStr(v,ref)} P${calcPctNum(v,ref)}]`;}
        return`${c.dataset.label}: ${v.toFixed(1)}${unit}（${ageStr}）${extra}`;
      }}}},
      scales:{
        x:{type:'linear',title:{display:true,text:'年齡（歲）',font:{size:12}},min:0,max:maxMo/12,
          ticks:{font:{size:11},callback:v=>Number.isInteger(v)?v+'歲':''}},
        y:{title:{display:true,text:yLabel,font:{size:12}},ticks:{font:{size:11}}}
      }
    }
  });
}

function openExport(){
  const child=S.children.find(c=>c.id===S.active);if(!child){toast('請先選擇孩子');return}
  const recs=S.records[S.active]||[];
  let csv='日期,月齡,年齡,身高(cm),身高百分位,體重(kg),體重百分位,頭圍(cm),頭圍百分位,BMI,BMI狀態\n';
  recs.forEach(r=>{
    const mo=getAgeMonths(child.birthday,r.date),age=getAgeYears(child.birthday,r.date);
    const ageStr=age<2?(mo+'月'):(age.toFixed(1)+'歲');
    const hRef=getRefHW('height',child.gender,mo),wRef=getRefHW('weight',child.gender,mo),hcRef=getRefHW('head',child.gender,mo);
    const ph=r.height&&hRef?calcPctStr(r.height,hRef):'';
    const pw=r.weight&&wRef?calcPctStr(r.weight,wRef):'';
    const phc=r.head&&hcRef&&mo<=60?calcPctStr(r.head,hcRef):'';
    let bmi='',bmiSt='';
    if(r.height&&r.weight){const b=r.weight/((r.height/100)**2);bmi=b.toFixed(1);bmiSt=calcBmiStatus(b,age,child.gender).label;}
    csv+=`${r.date},${mo},${ageStr},${r.height??''},${ph},${r.weight??''},${pw},${r.head??''},${phc},${bmi},${bmiSt}\n`;
  });
  document.getElementById('exbox').textContent=csv;openOv('ov-export');
}
function doCopy(){navigator.clipboard.writeText(document.getElementById('exbox').textContent).then(()=>toast('已複製 ✓'))}
function render(){
  renderTabs();const has=S.children.length>0&&S.active;
  document.getElementById('noChildCard').style.display=has?'none':'block';
  document.getElementById('addRecCard').style.display=has?'block':'none';
  if(has){renderMetrics();renderHistory();}
  if(S.tab==='chart'&&has)renderChart();
}
load();
</script>
